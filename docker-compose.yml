services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-psmpe_portal}
      POSTGRES_USER: ${POSTGRES_USER:-psmpe_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-psmpe_user} -d ${POSTGRES_DB:-psmpe_portal}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./src
      dockerfile: PSMPE.Portal.WebAPI/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: ${ConnectionStrings__DefaultConnection}
      Jwt__Key: ${Jwt__Key}
      Jwt__Issuer: ${Jwt__Issuer:-PSMPE.Portal}
      Jwt__Audience: ${Jwt__Audience:-PSMPE.Portal.Client}
      Jwt__ExpiryMinutes: ${Jwt__ExpiryMinutes:-60}
      Seed__Enabled: ${Seed__Enabled:-true}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      OpenAI__ApiKey: ${OpenAI__ApiKey}
      OpenAI__Model: ${OpenAI__Model:-gpt-4o-mini}
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./apps/web
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
