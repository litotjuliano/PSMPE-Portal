name: Deploy (uat)

# Deploys to the Droplet whenever the uat branch is updated. Building happens on the
# Droplet itself (docker compose build), so this workflow only needs SSH access.

on:
  push:
    branches: [uat]
  workflow_dispatch: {}

concurrency:
  group: deploy-uat
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin uat
            git checkout uat
            git reset --hard origin/uat
            docker compose -p psmpe-uat -f docker-compose.yml -f docker-compose.ports.yml up -d --build
            docker image prune -f
