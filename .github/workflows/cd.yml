name: CD

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push backend image
        run: |
          docker build \
            -f src/PSMPE.Portal.WebAPI/Dockerfile \
            -t "$REGISTRY/psmpe-backend:${{ github.sha }}" \
            -t "$REGISTRY/psmpe-backend:latest" \
            src
          docker push "$REGISTRY/psmpe-backend:${{ github.sha }}"
          docker push "$REGISTRY/psmpe-backend:latest"

      - name: Build and push frontend image
        run: |
          docker build \
            -f apps/web/Dockerfile \
            --build-arg VITE_API_BASE_URL="${{ vars.VITE_API_BASE_URL }}" \
            -t "$REGISTRY/psmpe-frontend:${{ github.sha }}" \
            -t "$REGISTRY/psmpe-frontend:latest" \
            apps/web
          docker push "$REGISTRY/psmpe-frontend:${{ github.sha }}"
          docker push "$REGISTRY/psmpe-frontend:latest"

      - name: Deploy to DigitalOcean App Platform
        run: doctl apps update "${{ secrets.DO_APP_ID }}" --spec infra/digitalocean/app.yaml
