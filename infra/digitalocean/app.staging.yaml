# DigitalOcean App Platform spec — STAGING/UAT (uatpsmpe.litxus.com)
#
# App Platform builds the images itself, straight from this GitHub repo — no container
# registry, no doctl, no GitHub Actions deploy step. Because deploy_on_push is true,
# every push to the `staging` branch automatically rebuilds and redeploys.
#
# One-time setup (see infra/digitalocean/README.md): create the app from this spec
# (dashboard → Create App → paste this YAML, or `doctl apps create --spec`), authorize
# DigitalOcean's access to the GitHub repo when prompted, then set the SECRET-type env
# vars in the DO dashboard.

name: psmpe-portal-staging
region: nyc

domains:
  - domain: uatpsmpe.litxus.com
    type: PRIMARY

services:
  - name: backend
    github:
      repo: litotjuliano/PSMPE-Portal
      branch: staging
      deploy_on_push: true
    source_dir: src
    dockerfile_path: src/PSMPE.Portal.WebAPI/Dockerfile
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /health
    routes:
      - path: /api
      - path: /swagger
    envs:
      - key: ASPNETCORE_ENVIRONMENT
        value: Staging
      - key: ASPNETCORE_URLS
        value: http://+:8080
      - key: ConnectionStrings__DefaultConnection
        value: ${db.DATABASE_URL}
        type: SECRET
      - key: Jwt__Key
        type: SECRET
      - key: Jwt__Issuer
        value: PSMPE.Portal
      - key: Jwt__Audience
        value: PSMPE.Portal.Client
      - key: Jwt__ExpiryMinutes
        value: "60"
      - key: Frontend__BaseUrl
        value: https://uatpsmpe.litxus.com
      - key: Seed__Enabled
        value: "true"
      - key: SEED_ADMIN_EMAIL
        type: SECRET
      - key: SEED_ADMIN_PASSWORD
        type: SECRET
      - key: OpenAI__ApiKey
        type: SECRET
      - key: OpenAI__Model
        value: gpt-4o-mini

  - name: frontend
    github:
      repo: litotjuliano/PSMPE-Portal
      branch: staging
      deploy_on_push: true
    source_dir: apps/web
    dockerfile_path: apps/web/Dockerfile
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 80
    routes:
      - path: /
    envs:
      # Baked into the built JS. The frontend and backend share this domain and the API
      # client already prefixes requests with /api, so point at the app's own origin.
      - key: VITE_API_BASE_URL
        value: https://uatpsmpe.litxus.com
        scope: BUILD_TIME

databases:
  - name: db
    engine: PG
    version: "16"
    production: false # dev-tier database is fine for staging
