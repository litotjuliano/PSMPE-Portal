name: Deploy to Staging

# Runs automatically when code lands on the `staging` branch.
# Builds the backend + frontend Docker images, pushes them to the DigitalOcean
# Container Registry, and tells the staging App Platform app to redeploy.
# Target: StagingPSMPE.litxus.com
on:
  push:
    branches: [staging]
  workflow_dispatch: {} # allows a manual re-deploy from the Actions tab

env:
  REGISTRY: registry.digitalocean.com/${{ secrets.DO_REGISTRY_NAME }}
  IMAGE_TAG: staging

jobs:
  test:
    name: Build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore src/PSMPE.Portal.sln
      - name: Build
        run: dotnet build src/PSMPE.Portal.sln --no-restore --configuration Release
      - name: Test
        run: dotnet test src/PSMPE.Portal.sln --no-build --configuration Release --logger "console;verbosity=normal"

  deploy:
    name: Build images + deploy
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push backend image
        run: |
          docker build \
            -f src/PSMPE.Portal.WebAPI/Dockerfile \
            -t "$REGISTRY/psmpe-backend:$IMAGE_TAG" \
            -t "$REGISTRY/psmpe-backend:${{ github.sha }}" \
            src
          docker push "$REGISTRY/psmpe-backend:$IMAGE_TAG"
          docker push "$REGISTRY/psmpe-backend:${{ github.sha }}"

      - name: Build and push frontend image
        run: |
          # Frontend and backend are served from the same App Platform domain, and the
          # API client already prefixes requests with /api, so the base URL must be empty
          # (same-origin). Setting it to /api would double up to /api/api.
          docker build \
            -f apps/web/Dockerfile \
            --build-arg VITE_API_BASE_URL= \
            -t "$REGISTRY/psmpe-frontend:$IMAGE_TAG" \
            -t "$REGISTRY/psmpe-frontend:${{ github.sha }}" \
            apps/web
          docker push "$REGISTRY/psmpe-frontend:$IMAGE_TAG"
          docker push "$REGISTRY/psmpe-frontend:${{ github.sha }}"

      - name: Deploy to staging App Platform
        run: |
          doctl apps update "${{ secrets.DO_APP_ID_STAGING }}" \
            --spec infra/digitalocean/app.staging.yaml \
            --wait
