name: CI

# Build and test on every pull request and on pushes to the long-lived branches.
# This never deploys anything — it only tells you whether the code compiles and the
# tests pass. Deployment is handled separately by cd-staging.yml / cd-prod.yml.
on:
  pull_request:
    branches: [main, staging, develop]
  push:
    branches: [main, staging, develop]

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore src/PSMPE.Portal.sln

      - name: Build
        run: dotnet build src/PSMPE.Portal.sln --no-restore --configuration Release

      # Integration tests use an EF Core InMemory database (see CustomWebApplicationFactory),
      # so no PostgreSQL service is required here.
      - name: Test
        run: dotnet test src/PSMPE.Portal.sln --no-build --configuration Release --logger "console;verbosity=normal"

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
